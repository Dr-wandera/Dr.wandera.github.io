<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>
<body>

<div class="main">

    <div class="logo">
        <img src="media/logo.png" alt="logo">
    </div>

    <div class="card">

        <form enctype="multipart/form-data">

            <div class="form-group">
                <h2>Welcome to Kibabii Industrial Training</h2>

                <label class="label"> Enter username</label>
                <input class="input" type="" name="" placeholder="username">
            </div>

            <div class="form-group">
                <label class="label"> Enter password</label>
                <input class="input" type="" password="" placeholder="*****">
            </div>

            <button class="btn-primary"> Log in</button>

            <a
             class="btn-register" href="register.html"> Don't have an Account? Register now
            </a>

            <a class="btn-forget" href="reset.html">Forgot password</a>
        </form>

    </div>
</div>
</body>
</html>
