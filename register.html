<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>
<body>

<div class="main">

    <div class="logo">
        <a href="index.html">
            <img src="media/logo.png" alt="logo">
        </a>
    </div>

    <div class="card">

        <form enctype="multipart/form-data">
            <h2>Create an account</h2>

            <div class="form-group">
                <label class="label"> Enter First Name</label>
                <input class="input" type="" name="" placeholder="first name">
            </div>

            <div class="form-group">
                <label class="label"> Enter Last Name</label>
                <input class="input" type="" name="" placeholder="last name">
            </div>

            <div class="form-group">
                <label class="label"> Enter Email</label>
                <input class="input" type="" name="" placeholder="Email">
            </div>

            <div class="form-group">
                <label class="label"> Enter password</label>
                <input class="input" type="" password="" placeholder="*****">
            </div>
            <div class="form-group">
                <label class="label"> Confirm password</label>
                <input class="input" type="" password="" placeholder="*****">
            </div>

            <button class="btn-primary"> Register</button>

            <a class="btn-register" href="index.html">  have an Account? Log in
            </a>
        </form>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<!--<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-firestore.js"></script>-->
</body>
</html>
